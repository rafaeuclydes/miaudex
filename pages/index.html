<!doctype html>
<html lang="pt=BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiauDex</title>

    <link
      rel="shortcut icon"
      href="../assets/favicon_miaudex.png"
      type="image/png"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <header class="cabecalho">
      <a href="">
        <img src="../assets/logo_miaudex.png" alt="Loco da Miaudex" />
      </a>
      <nav class="menu">
        <a href="">MiauDex</a>
        <a href="">Ajude uma ONG</a>
        <a href="">Contato</a>
      </nav>
    </header>

    <main class="principal">
      <div class="conteudo">
        <h1 class="titulo-principal">Explore o mundo dos Gatos</h1>
        <div class="cartoes">
          <article class="cartao">
            <img src="../assets/bengal.jpg" alt="Foto gato Bengal" />
            <h3>Bengal</h3>
            <button class="btn">Saiba mais</button>
            <div id="informacoes"></div>
          </article>
          <article class="cartao">
            <img src="../assets/exotic.jpg" alt="" />
            <h3>Exótico de pelo curto</h3>
            <button class="btn">Saiba mais</button>
            <div id="informacoes"></div>
          </article>
          <article class="cartao">
            <img src="../assets/persa.jpg" alt="" />
            <h3>Persa</h3>
            <button class="btn">Saiba mais</button>
            <div id="informacoes"></div>
          </article>
          <article class="cartao">
            <img src="../assets/siames.jpg" alt="" />
            <h3>Siames</h3>
            <button class="btn">Saiba mais</button>
            <div id="informacoes"></div>
          </article>
          <article class="cartao">
            <img src="../assets/sphynx.jpg" alt="" />
            <h3>Sphynx</h3>
            <button class="btn">Saiba mais</button>
            <div id="informacoes"></div>
          </article>
          <article class="cartao">
            <img src="../assets/gramps.jpeg" alt="" />
            <h3>Grampola</h3>
            <button class="btn">Saiba mais</button>
            <div id="informacoes"></div>
          </article>
        </div>
      </div>

      <aside class="lateral">
        <h2>Curiosidades</h2>
        <ul>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </aside>
    </main>

    <footer class="rodape">
      <p>Desenvolvido por Rafael Euclydes</p>
      <a href=""><img src="" alt="" /></a>
      <a href=""><img src="" alt="" /></a>
    </footer>
  </body>
</html>
